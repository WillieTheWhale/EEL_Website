# OpenShift Deployment Configuration for E.E.L. Application Portal
# Deploy with: oc apply -f openshift-deploy.yaml

apiVersion: v1
kind: List
items:

# Deployment
- apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: eel-website
    labels:
      app: eel-website
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: eel-website
    template:
      metadata:
        labels:
          app: eel-website
      spec:
        containers:
        - name: eel-website
          image: eel-website:latest
          ports:
          - containerPort: 8080
            protocol: TCP
          env:
          - name: PORT
            value: "8080"
          - name: ADMIN_PASSWORD
            valueFrom:
              secretKeyRef:
                name: eel-secrets
                key: admin-password
          - name: EMAIL_USER
            valueFrom:
              secretKeyRef:
                name: eel-secrets
                key: email-user
                optional: true
          - name: EMAIL_PASS
            valueFrom:
              secretKeyRef:
                name: eel-secrets
                key: email-pass
                optional: true
          - name: NOTIFY_EMAIL
            value: "wilk05@unc.edu"
          volumeMounts:
          - name: data-volume
            mountPath: /app/backend/data
          - name: uploads-volume
            mountPath: /app/backend/uploads
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
        volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: eel-data-pvc
        - name: uploads-volume
          persistentVolumeClaim:
            claimName: eel-uploads-pvc

# Service
- apiVersion: v1
  kind: Service
  metadata:
    name: eel-website
    labels:
      app: eel-website
  spec:
    type: ClusterIP
    ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
    selector:
      app: eel-website

# Route (external access)
- apiVersion: route.openshift.io/v1
  kind: Route
  metadata:
    name: eel-website
    labels:
      app: eel-website
  spec:
    to:
      kind: Service
      name: eel-website
    port:
      targetPort: 8080
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect

# Persistent Volume Claims
- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: eel-data-pvc
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 1Gi

- apiVersion: v1
  kind: PersistentVolumeClaim
  metadata:
    name: eel-uploads-pvc
  spec:
    accessModes:
    - ReadWriteOnce
    resources:
      requests:
        storage: 5Gi

---
# Create secrets separately:
# oc create secret generic eel-secrets \
#   --from-literal=admin-password='your-secure-password' \
#   --from-literal=email-user='your-email@gmail.com' \
#   --from-literal=email-pass='your-app-password'
